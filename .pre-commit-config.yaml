# Local-only pre-commit hooks. Do NOT enable in CI (Phase 1E plan: keep CI separate).
# Install with: .venv/bin/pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (auto-fix)
        entry: .venv/bin/python -m ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/python -m ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: sqlite-close
        name: sqlite3 connection close check
        entry: .venv/bin/python cli/lint_sqlite_close.py
        language: system
        types: [python]
        files: ^brain_core/.*\.py$
        pass_filenames: true

# bandit removed 2026-04-13 — bandit 1.8.0 can't parse Python 3.14 AST and
# silently skips every file. Security checks moved to ruff S-rules
# (ruff.toml::lint.select includes "S" — bandit-lite ported to ruff).
