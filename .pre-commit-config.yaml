# Local-only pre-commit hooks. Do NOT enable in CI (Phase 1E plan: keep CI separate).
# Install with: .venv/bin/pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (auto-fix)
        entry: .venv/bin/python -m ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/python -m ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: bandit
        name: bandit (security scan)
        entry: .venv/bin/python -m bandit -c bandit.yaml -q -r
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        files: ^(brain_core|cli|pipeline|server\.py|brain_mcp_server\.py)
