# intent_routes.yaml — L0 canonical guarantees for per-turn active recall.
#
# Each intent has bilingual keyword matchers. When any keyword (EN or KO) appears
# in a user prompt, the listed canonical_paths and always_push_queries are
# GUARANTEED to surface in the injection blocks regardless of vector similarity
# score. This is the layer that prevents "design standard loses to noisy hits"
# failures.
#
# Routing logic lives in brain_core/active_recall.py::_match_canonical_routes.
# Routes are loaded at service boot and re-read on canonical_embedding_refresh
# weekly cron. Chris's edits take effect on next service restart OR next cron run.
#
# Phase 5 learner (autonomy_proposer) proposes additions to this file from
# clusters of recall_miss events, writing candidates to eval_proposals for
# Chris's Sunday audit digest review.

version: 1
updated: 2026-04-14

