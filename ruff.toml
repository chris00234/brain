[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
  "RUF", # ruff-specific rules
  "ANN", # annotations
  "RET", # return statement smells
  "PTH", # prefer pathlib
  "T20", # no print outside CLI
  "S",   # bandit-lite security checks
]
ignore = [
  "ANN401",  # any-type allowed (pragmatic)
  "E501",    # line-too-long handled by formatter
  "B008",    # function-call-in-default-arg (FastAPI Depends pattern)
  "RUF012",  # mutable-class-default
  "S101",    # asserts allowed
  "S603",    # subprocess (legit in maintenance.py)
  "S607",    # partial-executable-path (subprocess)
]

[lint.per-file-ignores]
"tests/**" = ["ANN", "T20", "S", "PTH"]
"brain_core/maintenance.py" = ["S603", "S607", "T20"]
"cli/**" = ["T20", "S603", "S607"]
"brain_mcp_server.py" = ["T20"]
"server.py" = ["T20"]

# These modules are dual-use service helpers and direct cron/maintenance CLI
# entrypoints. Their `print` calls are the stable subprocess JSON interface used
# by JOB_REGISTRY; keep T20 active elsewhere in brain_core.
