# Wholesale-extracted from server.py — inherits pre-existing exception-
# handling patterns (B904 raise-without-from, S110/S112 best-effort
# swallowed exceptions). Treated as intentional for these files; clean up
# in a follow-up pass if/when specific endpoints are rewritten.
"brain_core/routes/memory.py" = ["B904", "S110", "S112", "RUF003", "ANN001", "ANN201", "ANN202", "S608"]
"brain_core/routes/recall.py" = ["B904", "S110", "S112", "RUF003", "ANN001", "ANN201", "ANN202", "S608"]

[lint.isort]
known-first-party = ["brain_core", "pipeline", "ingest", "synthesis", "cli"]

[format]
