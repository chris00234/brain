  "brain_core/reasoning.py",
  "brain_core/reasoning_loop.py",
  "brain_core/rerank.py",
  "brain_core/rrf.py",
  "brain_core/safe_state.py",
  "brain_core/scheduler.py",
  "brain_core/schema_versions.py",
  "brain_core/search.py",
  "brain_core/search_unified.py",
  "brain_core/self_heal.py",
  "brain_core/slo_monitor.py",
  "brain_core/spreading_activation.py",
  "brain_core/task_queue.py",
  "brain_core/temporal.py",
  "brain_core/temporal_reasoning.py",
