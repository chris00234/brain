  "brain_mcp_server.py",
  "cli/analyze_boot.py",
  "cli/backup_chroma.py",
  "cli/backup_neo4j.py",
  "cli/backup_verify.py",
  "cli/batch_learn.py",
  "cli/batch_learn_openclaw.py",
  "cli/brain_export.py",
  "cli/brain_finetune.py",
  "cli/context_format.py",
  "cli/eval_compare.py",
  "cli/eval_gate.py",
  "cli/eval_merge.py",
  "cli/eval_mine_canonical.py",
  "cli/eval_paired_test.py",
  "cli/eval_split.py",
  "cli/eval_sweep.py",
  "cli/eval_sweep_matrix.py",
  "cli/eval_sweep_verify.py",
  "cli/eval_validate.py",
  "cli/memory_store.py",
  "cli/migrate_to_neo4j.py",
  "cli/rag_learn.py",
  "cli/_minio.py",
  "cli/restore_chroma.py",
